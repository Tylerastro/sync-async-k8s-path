# ============================================================
# Namespace：loadtest
# ============================================================
# Namespace 是 K8s 的「隔離邊界」——同一個叢集裡的邏輯分區。
# 它讓我們可以：
#   1. 把壓測相關的資源（db、app、未來的 HPA）集中在一起，
#      一刀 `kubectl delete namespace loadtest` 就能全部清掉。
#   2. 避免跟 kube-system、default 裡面的系統 Pod 名稱衝突。
#   3. 未來若要加 ResourceQuota（限制整個 namespace 的 CPU/Memory
#      上限），Namespace 是掛載點。
#
# 教學注意：
#   不寫 namespace.yaml 也可以用 `kubectl create namespace loadtest`
#   但用 YAML 宣告比較符合「Infrastructure as Code」的精神——
#   所有狀態都在版本控制裡，不靠人工下指令。
# ============================================================

apiVersion: v1       # Namespace 屬於 core API group，不需要寫 apps/v1
kind: Namespace
metadata:
  name: loadtest     # 這個名字會出現在 kubectl get pods -n loadtest 裡
  labels:
    # 標籤（Labels）是鍵值對，用於 selector 和工具識別。
    # 這裡只是讓 kubectl get ns --show-labels 看得出用途。
    purpose: load-testing
    stage: "2"       # 對齊 roadmap 階段編號
